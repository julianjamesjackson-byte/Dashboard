server {
    listen 80;
    server_name dashboard.argylemedicalstaffing.com;

    root /var/www/dashboard.argylemedicalstaffing.com/html;
    index index.html;

    # Proxy API requests to n8n (bypasses CORS)
    location /api/n8n/ {
        proxy_pass http://2.25.76.245:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve the React app (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
